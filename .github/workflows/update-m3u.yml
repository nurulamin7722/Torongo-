name: Update Torongo+ Playlist

on:
  schedule:
    - cron: "*/20 * * * *"
  push:
    branches:
      - main
    paths:
      - "generate_m3u.py"
      - ".github/workflows/update-m3u.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch API (with headers)
        run: |
          TIMESTAMP=$(date +%s%3N)
          URL="https://api.ovation-bdofficial.workers.dev/database.json?nocache=$TIMESTAMP"

          echo "Fetching from $URL"

          curl -s -f \
            -H "Origin: https://torongoplus.vercel.app" \
            -H "Referer: https://torongoplus.vercel.app/" \
            -H "User-Agent: Mozilla/5.0" \
            "$URL" -o data.json || {
            echo "⚠ API fetch failed, attempting alternative..."
            # Try without the -f flag to see response
            curl -s \
              -H "Origin: https://torongoplus.vercel.app" \
              -H "Referer: https://torongoplus.vercel.app/" \
              "$URL" -o data.json || true
          }

          # Check if we got valid data
          if [ -s data.json ] && grep -q '"channels"' data.json; then
            CHANNEL_COUNT=$(python3 -c "import json; print(len(json.load(open('data.json')).get('channels', [])))" 2>/dev/null || echo "0")
            echo "✓ API fetch successful - got $CHANNEL_COUNT channels"
          else
            echo "⚠ API returned invalid/empty data, using cached version if available..."
            if [ ! -f .github/data-cache.json ]; then
              echo "ERROR: No cached data available and API fetch failed"
              exit 1
            fi
            cp .github/data-cache.json data.json
            echo "✓ Using cached data"
          fi

      - name: Validate JSON
        run: |
          echo "Checking data.json..."
          ls -lh data.json
          
          python3 -m json.tool data.json > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "ERROR: Invalid JSON in data.json"
            exit 1
          fi
          echo "✓ Valid JSON received"
          
          CHANNEL_COUNT=$(python3 -c "import json; print(len(json.load(open('data.json')).get('channels', [])))")
          echo "Channels found: $CHANNEL_COUNT"
          
          # Cache successful API response for future fallback
          mkdir -p .github
          cp data.json .github/data-cache.json
          echo "✓ Cached data for fallback"

      - name: Generate M3U
        run: |
          python3 generate_m3u.py
          if [ ! -s torongo_plus.m3u ]; then
            echo "ERROR: M3U file not generated"
            exit 1
          fi

      - name: Show generated file
        run: |
          echo "---- M3U PREVIEW ----"
          head -n 20 torongo_plus.m3u
          echo "---- FILE SIZE ----"
          wc -l torongo_plus.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          echo "=== DEBUG INFO ==="
          echo "Checking files..."
          ls -lh torongo_plus.m3u data.json
          
          echo "=== Repo version ==="
          git show HEAD:torongo_plus.m3u | head -3
          
          echo "=== Generated version ==="
          head -3 torongo_plus.m3u
          
          echo "=== Git diff ==="
          git diff --no-pager torongo_plus.m3u | head -50 || echo "No diff found"

          # Check if file has content
          if [ ! -s torongo_plus.m3u ]; then
            echo "ERROR: M3U file is empty!"
            exit 1
          fi

          FILE_SIZE=$(wc -c < torongo_plus.m3u)
          echo "M3U file size: $FILE_SIZE bytes"

          if [ $FILE_SIZE -lt 1000 ]; then
            echo "WARNING: M3U file seems too small"
          fi

          # Create metadata file to ensure commit is always made
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "$TIMESTAMP" > .last-update
          echo "Channels processed: $(python3 -c 'import json; print(len(json.load(open(\"data.json\")).get(\"channels\", [])))')" >> .last-update
          
          git add torongo_plus.m3u .last-update

          # Check what's staged
          echo "=== Staged changes ==="
          git diff --cached --stat

          # Commit with timestamp
          echo "Committing M3U update..."
          git commit -m "Auto update playlist at $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || {
            echo "WARNING: Commit failed, trying with --allow-empty..."
            git commit --allow-empty -m "Auto update playlist at $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          }
          
          # Push to repository
          echo "Pushing to repository..."
          git push origin main