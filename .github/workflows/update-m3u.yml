name: Update Torongo+ Playlist

on:
  schedule:
    - cron: "*/20 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch API (with headers)
        run: |
          TIMESTAMP=$(date +%s%3N)
          URL="https://api.ovation-bdofficial.workers.dev/database.json?nocache=$TIMESTAMP"

          echo "Fetching from $URL"

          curl -s -f \
            -H "Origin: https://torongoplus.vercel.app" \
            -H "Referer: https://torongoplus.vercel.app/" \
            -H "User-Agent: Mozilla/5.0" \
            "$URL" -o data.json

          if [ ! -s data.json ]; then
            echo "ERROR: Failed to fetch or empty response"
            exit 1
          fi

      - name: Validate JSON
        run: |
          python3 -m json.tool data.json > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "ERROR: Invalid JSON in data.json"
            exit 1
          fi
          echo "✓ Valid JSON received"
          python3 -c "import json; data = json.load(open('data.json')); print(f'Channels found: {len(data.get(\"channels\", []))}')"

      - name: Generate M3U
        run: |
          python3 generate_m3u.py
          if [ ! -s torongo_plus.m3u ]; then
            echo "ERROR: M3U file not generated"
            exit 1
          fi

      - name: Show generated file
        run: |
          echo "---- M3U PREVIEW ----"
          head -n 20 torongo_plus.m3u
          echo "---- FILE SIZE ----"
          wc -l torongo_plus.m3u

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json torongo_plus.m3u

          git commit -m "Auto update playlist $(date)" || echo "No changes to commit"

          git push